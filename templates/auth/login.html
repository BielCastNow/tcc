{% extends "base.html" %}

{% block title %}
Entrar
{% endblock %}

{% block content %}

<section class="auth-page">

    <div class="auth-card">

        <h1>Entrar</h1>

        <p>Acesse sua conta.</p>

        <form method="POST">

            <input type="email" name="email" placeholder="Seu email" required>

            <input type="password" name="senha" placeholder="Sua senha" required>

            <button type="submit">
                Entrar
            </button>

        </form>

        <p class="auth-link">
            Não possui conta?

            <a href="/cadastro">
                Criar conta
            </a>
        </p>

    </div>

</section>

{% endblock %}
